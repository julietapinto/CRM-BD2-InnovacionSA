<!DOCTYPE html>
<html>
<head>

<title>Clientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-3">Clientes</h2>

<form method="POST" action="/nuevo_cliente">

<input
class="form-control mb-2"
name="nombre"
placeholder="Nombre Comercial">

<input
class="form-control mb-2"
name="direccion"
placeholder="Direccion">

<input
class="form-control mb-2"
name="telefono"
placeholder="Telefono">

<input
class="form-control mb-2"
name="celular"
placeholder="Celular">

<input
class="form-control mb-2"
name="correo"
placeholder="Correo">

<button class="btn btn-success">
Guardar
</button>

</form>

<hr>

<table class="table">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Telefono</th>
<th>Correo</th>
</tr>

{% for c in clientes %}

<tr>

<td>{{c.id_cliente}}</td>
<td>{{c.nombre_comercial}}</td>
<td>{{c.telefono}}</td>
<td>{{c.correo}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
