<!DOCTYPE html>
<html>
<head>

<title>Oportunidades</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container">

<h2 class="mt-3">Reporte Oportunidades</h2>

<table class="table table-bordered">

<tr>
<th>Numero</th>
<th>Oportunidad</th>
<th>Cliente</th>
<th>Etapa</th>
<th>Porcentaje</th>
<th>Estado</th>
<th>Monto</th>
</tr>

{% for o in oportunidades %}

<tr>

<td>{{o.numero_oportunidad}}</td>
<td>{{o.nombre_oportunidad}}</td>
<td>{{o.nombre_comercial}}</td>
<td>{{o.nombre_etapa}}</td>
<td>{{o.porcentaje}}</td>
<td>{{o.estado}}</td>
<td>{{o.monto_potencial}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
